<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 96" fill="none"
     shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- מארק: מגדלים (skyline) — בסיס מיושר -->
  <g fill="#14202b">
    <rect x="23" y="32" width="5"  height="44" />
    <rect x="34" y="12" width="8"  height="64" />
    <rect x="46" y="22" width="6"  height="54" />
    <rect x="56" y="42" width="4"  height="34" />
  </g>
  <!-- KURKOOS — שני ה-O משתלבים (טורקיז מעל אדום) -->
  <text x="86" y="56" text-anchor="start"
        font-family="Georgia, 'Times New Roman', 'Noto Serif', serif"
        font-size="40" font-weight="400" letter-spacing="2" fill="#14202b">KURK<tspan fill="#a90b0c">O</tspan><tspan fill="#105572" dx="-15">O</tspan><tspan dx="2">S</tspan></text>
  <!-- GROUP -->
  <text x="88" y="83" text-anchor="start"
        font-family="Georgia, 'Times New Roman', 'Noto Serif', serif"
        font-size="15.5" font-weight="400" letter-spacing="9" fill="#14202b">GROUP</text>
</svg>
