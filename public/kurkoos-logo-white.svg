<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" fill="none"
     shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- מארק: מגדלים (skyline) — בסיס מיושר -->
  <g fill="#ffffff">
    <rect x="118" y="80"  width="9"  height="110" />
    <rect x="138" y="20"  width="12" height="170" />
    <rect x="158" y="50"  width="10" height="140" />
    <rect x="174" y="105" width="8"  height="85" />
  </g>
  <!-- KURKOOS — שני ה-O משתלבים (טורקיז מעל אדום) -->
  <text x="160" y="245" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Noto Serif', serif"
        font-size="56" font-weight="400" letter-spacing="5" fill="#ffffff">KURK<tspan fill="#e0696a">O</tspan><tspan fill="#5ba8c8" dx="-21">O</tspan><tspan dx="3">S</tspan></text>
  <!-- GROUP -->
  <text x="160" y="282" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Noto Serif', serif"
        font-size="26" font-weight="400" letter-spacing="14" fill="#ffffff">GROUP</text>
</svg>
